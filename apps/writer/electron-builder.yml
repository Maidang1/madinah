appId: cn.felixwliu.madinah.writer
productName: Madinah Writer
asar: false
directories:
  output: release
  buildResources: buildResources
files:
  - out/**/*
  - package.json
extraMetadata:
  main: out/main/index.cjs
publish:
  provider: github
  owner: Maidang1
  repo: madinah
  tagNamePrefix: writer-v
  releaseType: release
mac:
  category: public.app-category.productivity
  icon: buildResources/icon.icns
  artifactName: Madinah-Writer-${version}-${arch}.${ext}
  electronUpdaterCompatibility: ">=2.16"
  target:
    - dmg
    - zip
