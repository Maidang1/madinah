name: Writer Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Optional release notes; defaults to the latest changelog section."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: writer-release
  cancel-in-progress: false
  # actionlint v1.7.12 predates GitHub's 2026-05 queue extension; validation
  # ignores only its "unexpected key queue" compatibility diagnostic.
  queue: max

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.9"
  WRITER_DIR: apps/writer
  MACOS_TARGET: aarch64-apple-darwin

jobs:
  macos:
    name: Build macOS release
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve release metadata
        id: metadata
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: node apps/writer/scripts/release-config.mjs metadata

      - name: Validate release credentials
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          WRITER_RELEASE_TOKEN: ${{ secrets.WRITER_RELEASE_TOKEN }}
        run: |
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            TAURI_SIGNING_PRIVATE_KEY \
            WRITER_RELEASE_TOKEN
          do
            if [ -z "${!name}" ]; then
              echo "Missing required repository secret: $name"
              exit 1
            fi
          done

      - name: Validate source ref
        env:
          SOURCE_DEFAULT_BRANCH: ${{ steps.metadata.outputs.source_default_branch }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          git fetch origin "$SOURCE_DEFAULT_BRANCH" --tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$SOURCE_DEFAULT_BRANCH"; then
            echo "$GITHUB_SHA is not reachable from origin/$SOURCE_DEFAULT_BRANCH."
            exit 1
          fi

          existing_sha=$(git rev-list -n 1 "$RELEASE_TAG" 2>/dev/null || true)
          if [ -n "$existing_sha" ] && [ "$existing_sha" != "$GITHUB_SHA" ]; then
            echo "$RELEASE_TAG points to $existing_sha, expected $GITHUB_SHA."
            exit 1
          fi

      - name: Claim target draft
        id: release
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
          WRITER_RELEASE_TOKEN: ${{ secrets.WRITER_RELEASE_TOKEN }}
        run: node apps/writer/scripts/release-config.mjs claim

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ env.MACOS_TARGET }}

      - name: Cache Rust
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/writer/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check writer frontend
        run: pnpm --filter writer check

      - name: Test writer frontend and release helpers
        run: pnpm --filter writer test

      - name: Check writer Rust
        working-directory: apps/writer/src-tauri
        run: |
          cargo fmt --all -- --check
          cargo test --locked
          cargo clippy --locked --all-targets

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/writer-certificate.p12"
          keychain_path="$RUNNER_TEMP/writer-signing.keychain-db"
          keychain_password=$(openssl rand -base64 32)
          original_keychain=$(security default-keychain -d user | tr -d '"')

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 5400 "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          {
            echo "WRITER_CERTIFICATE_PATH=$certificate_path"
            echo "WRITER_KEYCHAIN_PATH=$keychain_path"
            echo "WRITER_ORIGINAL_KEYCHAIN=$original_keychain"
          } >> "$GITHUB_ENV"

      - name: Resolve signing identity
        run: |
          cert_info=$(security find-identity -v -p codesigning "$WRITER_KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 || true)
          if [ -z "$cert_info" ]; then
            echo "No Developer ID Application identity found."
            security find-identity -v -p codesigning "$WRITER_KEYCHAIN_PATH"
            exit 1
          fi
          cert_id=$(echo "$cert_info" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"

      - name: Build and upload draft assets
        id: tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.WRITER_RELEASE_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.WRITER_DIR }}
          tauriScript: pnpm tauri
          releaseId: ${{ steps.release.outputs.release_id }}
          releaseBody: ${{ steps.metadata.outputs.release_notes }}
          releaseDraft: true
          owner: ${{ steps.metadata.outputs.owner }}
          repo: ${{ steps.metadata.outputs.repo }}
          args: --target ${{ env.MACOS_TARGET }} --bundles app,dmg
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

      - name: Verify draft assets
        id: verify
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          WRITER_RELEASE_TOKEN: ${{ secrets.WRITER_RELEASE_TOKEN }}
        run: node apps/writer/scripts/release-config.mjs verify

      - name: Record source tag for manual release
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          existing_sha=$(git rev-list -n 1 "$RELEASE_TAG" 2>/dev/null || true)
          if [ -n "$existing_sha" ]; then
            if [ "$existing_sha" != "$GITHUB_SHA" ]; then
              echo "$RELEASE_TAG points to $existing_sha, expected $GITHUB_SHA."
              exit 1
            fi
            echo "$RELEASE_TAG already points to the release commit."
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$RELEASE_TAG"
          fi

      - name: Write release summary
        run: |
          {
            echo "## Writer release"
            echo ""
            echo "- Version: ${{ steps.metadata.outputs.version }}"
            echo "- Source: $GITHUB_REPOSITORY@$GITHUB_SHA"
            echo "- Target: ${{ steps.metadata.outputs.owner }}/${{ steps.metadata.outputs.repo }}"
            echo "- Target branch: ${{ steps.release.outputs.target_default_branch }}"
            echo "- Draft state: ${{ steps.release.outputs.release_state }}"
            echo "- Updater platforms: ${{ steps.verify.outputs.platforms }}"
            echo "- Draft release: ${{ steps.release.outputs.release_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove signing credentials
        if: always()
        run: |
          if [ -n "${WRITER_ORIGINAL_KEYCHAIN:-}" ]; then
            security default-keychain -d user -s "$WRITER_ORIGINAL_KEYCHAIN" || true
          fi
          if [ -n "${WRITER_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$WRITER_KEYCHAIN_PATH" || true
          fi
          if [ -n "${WRITER_CERTIFICATE_PATH:-}" ]; then
            rm -f "$WRITER_CERTIFICATE_PATH"
          fi
