name: Writer Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Optional GitHub release notes body."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: writer-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.9"
  WRITER_DIR: apps/writer
  MACOS_TARGET: aarch64-apple-darwin

jobs:
  macos:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.MACOS_TARGET }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/writer/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check writer
        run: pnpm --filter writer check

      - name: Test writer
        run: pnpm --filter writer test

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const tauriConf = JSON.parse(
            fs.readFileSync("apps/writer/src-tauri/tauri.conf.json", "utf8"),
          );
          const packageJson = JSON.parse(
            fs.readFileSync("apps/writer/package.json", "utf8"),
          );
          const cargoToml = fs.readFileSync(
            "apps/writer/src-tauri/Cargo.toml",
            "utf8",
          );
          const cargoVersion = cargoToml.match(/^version\s*=\s*"([^"]+)"/m)?.[1];

          const version = tauriConf.version;
          if (packageJson.version !== version || cargoVersion !== version) {
            throw new Error(
              `Version mismatch: tauri=${version}, package=${packageJson.version}, cargo=${cargoVersion}`,
            );
          }

          const tag = `v${version}`;
          const githubRef = process.env.GITHUB_REF || "";
          const githubRefName = process.env.GITHUB_REF_NAME || "";
          if (githubRef.startsWith("refs/tags/") && githubRefName !== tag) {
            throw new Error(`Release tag ${githubRefName} must match ${tag}.`);
          }

          const endpoint = tauriConf.plugins?.updater?.endpoints?.[0] || "";
          const endpointMatch = endpoint.match(
            /^https:\/\/github\.com\/([^/]+)\/([^/]+)\/releases\/latest\/download\/latest\.json$/,
          );
          if (!endpointMatch) {
            throw new Error(
              `Updater endpoint must be a GitHub latest.json release URL: ${endpoint}`,
            );
          }

          const [, owner, repo] = endpointMatch;
          const releaseNotes =
            process.env.RELEASE_NOTES?.trim() ||
            `Automated Writer ${tag} macOS release.`;

          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `version=${version}\n`);
          fs.appendFileSync(output, `tag=${tag}\n`);
          fs.appendFileSync(output, `owner=${owner}\n`);
          fs.appendFileSync(output, `repo=${repo}\n`);
          fs.appendFileSync(output, `release_name=Writer ${tag}\n`);
          fs.appendFileSync(output, `release_body<<EOF\n${releaseNotes}\nEOF\n`);
          NODE

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and KEYCHAIN_PASSWORD secrets are required."
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Resolve signing identity
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 || true)
          if [ -z "$CERT_INFO" ]; then
            echo "No Developer ID Application identity found in build.keychain."
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Certificate imported: $CERT_ID"

      - name: Build and publish draft release
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.WRITER_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.WRITER_DIR }}
          tauriScript: pnpm tauri
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.release_name }}
          releaseBody: ${{ steps.release.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          owner: ${{ steps.release.outputs.owner }}
          repo: ${{ steps.release.outputs.repo }}
          releaseCommitish: main
          args: --target ${{ env.MACOS_TARGET }} --bundles app,dmg
          retryAttempts: 1

      - name: Write release summary
        run: |
          {
            echo "## Writer release"
            echo ""
            echo "- Version: ${{ steps.release.outputs.version }}"
            echo "- Tag: ${{ steps.release.outputs.tag }}"
            echo "- Repository: ${{ steps.release.outputs.owner }}/${{ steps.release.outputs.repo }}"
            echo "- Draft release: ${{ steps.tauri.outputs.releaseHtmlUrl }}"
          } >> "$GITHUB_STEP_SUMMARY"
