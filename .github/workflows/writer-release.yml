name: Writer Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build macOS release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release tag
        run: |
          node <<'NODE'
          const config = require("./apps/writer/src-tauri/tauri.conf.json");
          const expected = `v${config.version}`;
          if (process.env.GITHUB_REF_NAME !== expected) {
            throw new Error(`Release tag ${process.env.GITHUB_REF_NAME} must be ${expected}.`);
          }
          NODE

      - name: Build and create draft release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: apps/writer
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: Writer v__VERSION__
          releaseBody: Download the macOS build from the assets below.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: false
          args: --target aarch64-apple-darwin --bundles dmg
